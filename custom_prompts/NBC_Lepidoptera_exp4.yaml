prompt_author: Chanou van den Broek, Kees te Velde
prompt_author_institution: Naturalis Biodiversity Center
prompt_name: NBC_Lepidoptera_exp4
prompt_version: v-1-0
prompt_description: Prompt developed by Naturalis Biodiversity Center for use with Lepidoptera collections.
LLM: This is intended to be used with thinking-capable models like Gemini-3.1.
instructions: 1. Refactor the unstructured OCR text into a dictionary based on the JSON structure outlined below.
  2. Map the unstructured OCR text to the appropriate JSON key and populate the field given the user-defined rules.
  3. The OCR may include helpful hints that identify handwritten text, stricken, and redacted text. Handwritten text is often a species name. Redacted or stricken text is often an old species name that should be included in the identificationHistory. The text or markdown that denotes this type of special text should not be included in the JSON, only include the actual content of the text.
  4. Redacted or stricken text will have section signs on either side (§stricken text§). Handwritten text will have guillemet quotes on either side («handwritten text»).
  5. Use the @ symbol as a placeholder for any illegible or unreadable characters on the label.
  6. If you see Text in the OCR that reports on the OCR engine itself, do not include that in the JSON.
  7. JSON key values are permitted to remain empty strings if the corresponding information is not found in the unstructured OCR text.
  8. Duplicate dictionary fields are not allowed.
  9. Ensure all JSON keys are in camel case.
  10. Ensure new JSON field values follow sentence case capitalization, but if the text represents abbreviations, acronyms, or initialisms then leave the capitalization as found in the OCR.
  11. Ensure all key-value pairs in the JSON dictionary strictly adhere to the format and data types specified in the template.
  12. Ensure output JSON string is valid JSON format. It should not have trailing commas or unquoted keys.
  13. Only return a JSON dictionary represented as a string. You should not explain your answer.
  14. After you create the JSON, if there are not already coordinates in the decimalLatitude and decimalLongitude fields, then use all of the information to geolocate the specimen. Remember that you are an expert biogeographer specializing in georeferencing biological specimen data. Your task is to infer the most accurate decimal latitude and longitude coordinates possible from museum specimen locality information. These are all butterflies, so coordinates must be land-based and not coorespond to points in bodies of water.
  CONTEXT. You are working with historical biological specimen records that may have varying levels of geographic specificity, from broad regions down to specific collection sites.
  YOUR APPROACH. Analyze all available geographic fields hierarchically (country → island → state/province → locality). Use the most specific location information available to determine coordinates. For specific landmarks, parks, or named locations, provide precise coordinates. For municipalities/cities, use city center coordinates. For counties, use geographic centroid of the county. For countries (including when only a country code abbreviation is provided), use geographic centroid of the country. For larger administrative units, use conservative central coordinates.
  IMPORTANT PRINCIPLES. Prioritize accuracy, be extremely precise if you are confident. Be conservative with confidence levels,  only mark as "high" confidence for very specific locations. Consider that historical locality names may have changed. Account for the fact that biological specimens are usually collected from terrestrial, accessible areas. When in doubt, use centroid coordinates of the smallest known administrative unit.
  CONSTRAINTS. Use WGS84 decimal degrees format. For confidence, if the GPS is provided in the text already, use 'verbatim' in the inferredGPSConfidence field. 'high' confidence only for specific locations (cities, landmarks, parks, intersections, addresses, buildings). 'medium' confidence for general areas (counties). 'low' confidence for vague regions (states/provinces). Return empty strings for decimalLatitude and decimalLongitude if too vague to determine reasonable location and use 'na' for inferredGPSConfidence. Latitude range from -90 to 90, Longitude range from -180 to 180. Your response must place the inferred latitude in the decimalLatitude field, place the inferred longitude in the decimalLongitude field, and the confidence in the inferredGPSConfidence field.
json_formatting_instructions: This section provides rules for formatting each JSON value organized by the JSON key. Correct minor typos introduced by OCR errors.
rules:
  acquiredFrom: The verbatim name of the individual or organization that donated or provided the specimen. Identify names specifically introduced by markers like acq., acquired, don., or donated. Transcribe the associated name exactly as it appears on the label, preserving all initials. Ensure you distinguish this from the collector, as the material may have been transferred by a third party. If no name is clearly linked to an acquisition term, leave this field entirely empty.
  additionalText: Identify and extract all text excluded from the primary and secondary label fields. Gather all background text, supporting details, and leftover OCR strings to ensure a complete record of the specimen's surrounding information.
  altitudeUnit: The standardized unit of measurement for the altitude values found on the label. If the altitude is expressed in meters (e.g., 'm', 'meters', 'metres') record the value m. If the altitude is expressed in feet (e.g., 'ft', 'feet', 'voet') or indicated by the symbol ' or if the label uses the Dutch term 'zeeniveau' (sea level), record the value ft. If the label uses an uncommon unit (e.g., 'vadem', 'fathoms'), record the term exactly as written. If the label contains no altitude, elevation, or sea level information whatsoever, leave this field entirely blank. Provide only the unit code or the specific name of the unit; do not include numbers.
  authorAndYear: The authorship and year for the specific taxonomic identification. In cases where the label lists multiple authors (such as a genus author followed by a species author), extract only the author(s) and year associated with the most specific name provided. For example, if 'Catopsilia Hbn.' and 'Pomona F.' are present, record only 'F.' (or 'Fabricius'). You are authorized to expand well-known entomological abbreviations to their full names (e.g., 'Butl.' to 'Butler', 'Hbn.' to 'Hubner') if the identity is certain. Maintain the original formatting, including parentheses, and leave blank if no specific authorship is found.
  biotope: The verbatim ecological, habitat, or biotope context as recorded by the collector in English or Dutch. Extract descriptions of the environment such as 'primair bos' (primary forest), 'moeras' (swamp), 'berm' (roadside), or 'zeekust' (sea coast). Transcribe the original text exactly, preserving the language, spelling, and punctuation used by the collector. If the label does not provide any descriptive information about the biotope/habitat, leave this field entirely blank.
  collectingMethod: The verbatim collecting method or rearing status of the specimen, including standardized interpretations. Identify the following Dutch/Latin abbreviations and append the bracketed English interpretation - e.l. as e.l. [ex larva] (collected as caterpillar), e.o. as e.o. [ex ovum] (collected as egg), e.p. as e.p. [ex pupa] (collected as cocoon), a.o. as a.o. [ab ovo], a.l. as a.l. [ab larva], o.l. or the phrase op licht as o.l. [light trap] or op licht [light trap]. If other methods are mentioned (e.g., 'malaise trap', 'baited trap', 'netted'), record the text verbatim. If no abbreviation from the list or any description of how the specimen was caught/reared is present, leave this field blank. Do not guess the method.
  collectionDate: The interpreted earliest start date for the collection event formatted as DD/MM/YYYY. In cases where multiple dates are listed, identify the earliest one to serve as the start of the range. You must broaden partial dates - if only a year is provided, use the first day of that year (01/01/YYYY); if only a month and year are provided, use the first day of that month (01/MM/YYYY). Translate Roman numerals to months and assume two-digit years like '38 refer to 1938. For a range or an uncertain day marked with @, record the earliest possible numerical date. If no date information is available, leave the field empty.
  collectionDateEnd: The interpreted latest end date for the collection event formatted as DD/MM/YYYY. This field must reflect the latest possible date mentioned to broaden the temporal range. If only a year is provided, use the last day of that year (31/12/YYYY). If only a month is provided, use the last day of that month (e.g., 28/02 for February). In cases of multiple dates or a range, record the most recent date mentioned. For uncertain digits marked with @, record the maximum possible date. If the collection date is a single certain day with no range or alternative, or if no date is found at all, leave this field empty.
  collectionName: The overarching name of the collection or provenance. Use this field for names found on separate, distinct collection labels. Regardless of how it is written on the label, if the collection refers to Van Groenendael, you must record it exactly as 'Collection Van Groenendael'. For other collectors, transcribe the name verbatim (e.g., 'J. Moonen'). If there are two or more (ex-)collection names, record them both in this field separated by a semicolon and a space (e.g., 'J. Moonen; v.d. Bergh'). Do not include names from the primary locality label here. If no separate collection label is identified, leave this field entirely empty.
  collector: Identify the individual(s) who collected the specimen. Per guidelines, if the abbreviation 'c.' or 'coll.' appears on the primary locality label (containing geography/date), interpret the associated name as the collector. Include any standalone personal names or names preceded by 'Leg.' (legit). Do not include names from separate 'Collection' labels or names marked with 'det.'. Provide a comma-separated list, primary collector first. Leave blank if no collector is identifiable on the locality label.
  country: The standardized modern country name. Use a two-step logic - 1. If a modern country name is explicitly mentioned on the label, extract it. 2. If only a historical name (e.g., 'Nederlands-Indie') or a specific locality is provided, infer the modern country equivalent. Ensure the output is the current, recognized country name. If the locality exists in multiple countries and the label provides no clarification, leave blank.
  dateOfAcquisition: The interpreted earliest start date for the acquisition event formatted strictly as DD/MM/YYYY. Replace unknown day or month components with 01 to represent the start of the period (e.g., a year 1978 becomes 01/01/1978; a month May 1978 becomes 01/05/1978). Assume two-digit years refer to the 1900s. Only calculate this date if an acquisition date is present in the verbatim field; otherwise, leave empty.
  dateOfAcquisitionEnd: The standardized ending date for the acquisition period (DD/MM/YYYY). If the verbatim date is a single year, broaden the range to the end of that year (31/12/YYYY). If it is a month and year, use the last day of that month. If the acquisition occurred on one specific day or no date is known, leave empty.
  family: The specific taxonomic family classification associated with the specimen. The value must be a single, capitalized word ending in the zoological family suffix '-idae' (e.g., 'Pieridae', 'Lycaenidae', 'Hesperiidae'). First, attempt to extract the family name directly from the label. If missing, you are authorized to infer the family based on the provided Genus or Species name, but only if the taxonomic placement is globally accepted and certain. Do not guess. If the genus is ambiguous or if the specimen is completely unidentified, do not provide a family name. If no taxonomic data exists to support a high-confidence identification, the field must remain empty.
  fullLocalityText: The comprehensive locality string as it appears on the specimen label. Transcribe the text exactly, preserving historical spellings, abbreviations, and punctuation. You must include any coordinate data found in this field. This serves as the raw, verbatim record of the collection site before any modern standardization is applied. If no locality information is present, leave this field entirely blank.
  fullScientificName: The comprehensive, formal scientific name for the specimen, constructed according to ICZN standards. Combine the Genus (capitalized), species (lowercase), and subspecies (lowercase), followed by the expanded authorship and year (e.g., 'Argynnis paphia (Linnaeus, 1758)'). This field is reserved for specimens identified to the species level or below. If the specific epithet is unknown, missing, or cannot be inferred with high confidence, even if the Genus is known, you must leave this field entirely blank. Ensure parentheses are correctly applied to the authorship if the species has been moved from its original genus. Do not use 'indet.' or placeholder text in this specific field.
  genus: The taxonomic genus classification for this butterfly or moth specimen, ensuring the output is a single, capitalized Latin name. You are authorized to use your internal taxonomic knowledge to infer the genus if only a specific epithet or unique common name is provided, but only if the taxonomic placement is stable and undisputed. If a genus-level identification is entirely missing from the source and cannot be confidently inferred through your database, you must not use placeholders or higher-taxa names; the field must be left entirely blank to ensure data integrity.
  identifier: A comma-separated list of names of the individuals, groups, or organizations who performed the taxonomic determination. Look for the abbreviations 'det.', 'ident.', 'determinavit', or Dutch 'gedetermineerd door'. This is not the specimen collector. You must strictly exclude names associated with 'leg.', 'legit', 'coll.', or 'vgr.' (verzamelaar). Also exclude acquisition sources associated with 'acq.', 'don.', or 'gift'. If multiple identification labels are present, prioritize the most recent determination. If you cannot definitively confirm that a name belongs to the determiner, or if the label is illegible, leave this field blank. Do not guess.
  identifierDate: The date on which the most recent taxonomic determination was assigned to the specimen. Format DD/MM/YYYY. If only partial information is available (e.g., just the year), use zeros for the unknown components (e.g., 00/00/1995). This date must be specifically associated with the identifier or the 'det.' string. Do not use the collection date (found near locations or 'leg.'/'coll.') or the acquisition date (near 'acq.'/'don.'). Many labels only have a collection date; if no separate identification date is present, this field must remain entirely empty. If the date's purpose is ambiguous, leave it blank.
  island: The current, standardized name of the island where the specimen was collected. If the modern island name appears on the label, extract it exactly. If the label uses a historical, colonial, or archaic island name, you must update it to the modern recognized name (e.g., change 'Celebes' to 'Sulawesi'). If the island is not named but a locality or province is provided, use your internal geographic knowledge to assign the correct island (e.g., 'Mount Sibayak' or 'Medan' should result in 'Sumatra'). Do not hallucinate. If the specimen was collected on a continent/mainland, or if the locality name is ambiguous and could belong to multiple islands, leave this field entirely blank. Do not provide a guess.
  locality: The modern standardized name of the specific locality. While you should prioritize the specific site mentioned (mountain, village, or forest), you should update historical or colonial names to their current accepted equivalents to facilitate CRS mapping. If the site no longer exists or the name is too obscure to standardize, provide the verbatim text from the label.
  maxAltitude: The maximum elevation or altitude of the collection site. This field is only for the upper limit of a range (e.g., '500 to 1000m' results in '1000'). If the label lists only one altitude (e.g., 'sea level' or '300m'), do not populate this field; it must remain an empty string. Record the number exactly as it appears. If the label contains no altitude or elevation information, leave this field blank.
  minAltitude: The minimum elevation or altitude of the collection site. If the label mentions 'sea level', 'zeepeil' or 'zeeniveau', record '0'. In a range (e.g., '100-200m'), extract the lower number '100'. If only one altitude is listed (e.g., '500m'), record '500'. If the label does not contain any mention of height, elevation, altitude, meters, feet, or sea level, you must leave this field entirely empty. Record the number exactly as it appears. Do not infer altitude from the name of a mountain or location.
  registrationNumber: Qrcode identifier, typically ZMA.INS. or RMNH.INS. followed by a number with at least 6 digits, but fewer than 15 digits.
  rowlabel: Systematically scan for any string containing the keyword 'label' specifically targeting 'rowlabel', 'boxlabel', and 'small label'. Record the literal text found and explicitly identify the presence and orientation of any adjacent arrow symbols as metadata for that label.
  sex: The biological sex of the Lepidoptera specimen. Carefully scan for the male symbol, the female symbol, single-letter abbreviations ('M', 'F', 'm', 'f'), or full Dutch/English words ('man', 'vrouw', 'male', 'female'). The value must be either 'male' or 'female'. Because these symbols can be subject to OCR misinterpretation, if you identify the sex via a symbol, you must record 'male' or 'female' in this box AND add a specific note to the additionalText field stating 'Sex determined from symbol on label.' Do not infer sex based on the butterfly's wing pattern; only record it if the label explicitly states it. If no sex indicated by word, letter, or symbol, leave this field entirely blank.
  species: The taxonomic specific epithet for this butterfly or moth specimen, ensuring the output consists only of the species name in all lowercase letters. You are authorized to use your internal taxonomic knowledge to determine the species if the label is incomplete but provides enough diagnostic information, such as a subspecies name. However, if the species is not explicitly stated and cannot be inferred with absolute professional certainty, you must not provide a guess or placeholder; the field must be left entirely blank to maintain the integrity of the scientific record.
  stateProvince: The current, standardized name of the state, province, or primary administrative region. If the modern province name appears on the label, record it as the primary value. If the label provides an older, colonial, or defunct regional name (e.g., changing 'Batavia' as a region to 'Jakarta'), you must update it to the modern equivalent. If the province is not written but a specific locality is provided (e.g., 'Mount Malabar'), use your internal geographic knowledge to assign the correct modern province. Do not hallucinate. If the locality is found in multiple provinces, or if the label information is too vague to pinpoint a specific administrative region, you must leave this field entirely blank. Do not provide a guess.
  subfamily: The taxonomic subfamily classification. Use the established Lepidoptera phylogeny to infer the subfamily from the genus (e.g., Morpho implies Morphinae or Satyrinae depending on the classification system used). The name must end in the standard suffix '-inae' and be capitalized. If the label lacks this info, fill it only if the genus-to-subfamily relationship is globally stable. If the specimen is unidentified or the genus is taxonomically disputed at the subfamily level, leave blank.
  subgenus: The scientific subgenus of the specimen. Subgenus must be capitalized. In entomological nomenclature, the subgenus is almost always recorded within parentheses between the genus name and the species name. Identify this name (e.g., 'Princeps' in Papilio (Princeps) demolion) and transcribe it exactly without the brackets. Ensure you do not confuse this with a subspecies name or the name of an author. If no name in parentheses is present that fits the zoological nomenclature for a subgenus, this field must remain blank.
  subspecies: The taxonomic subspecific epithet for this Lepidoptera specimen, which must be provided as a single word in all lowercase letters. This field is reserved strictly for infraspecific identifications; if the specimen is only identified to the species level, this field must remain empty. You should only infer a subspecies if the locality data and phenotype described on the label allow for a definitive identification under current butterfly phylogeny. Do not include rank indicators like 'ssp.' or 'subsp.' in this field, provide only the name itself. If no subspecies-level information is available, leave the field entirely blank.
  tribe: The taxonomic tribe classification. Many butterfly genera belong to specific tribes (e.g., Vanessa belongs to Nymphalini). Use your internal database to provide this if the genus is present. The name must end in the standard suffix '-ini' and be capitalized. Do not hallucinate a tribe if the genus is typically placed directly in a subfamily without a tribal level. If no specimen data is provided, or if the tribal placement is a matter of intense taxonomic debate, leave the field blank.
  verbatimAltitude: The elevation information exactly as it appears on the specimen labels. Transcribe text verbatim, including original units (e.g., 100m, 300', 500 ft). If a range is provided (e.g., 100-200m), record the full range. Include descriptive terms like sea level, zeepeil, or zeeniveau. Do not perform any unit conversions or corrections. If there is no mention of altitude or elevation on any label, leave this field as an empty string.
  verbatimCollectingDate: The verbatim collecting date(s) found on the specimen labels. Transcribe the text exactly as written. If the label (or multiple labels) contains two or more distinct dates, you must record them all in this field, separated by a semicolon and a space. Preserve all original formatting, including Roman numerals and use the @ symbol for illegible digits. If no date information is present, leave this field entirely empty.
  verbatimCoordinates: Identify and capture the raw coordinate data exactly as printed or handwritten. This includes latitude/longitude, UTM, or local grid references. If you encounter ambiguity or partial coordinates, transcribe the visible characters and append a confidence percentage for any interpreted symbols. Do not attempt to fix or normalize the data; prioritize the verbatim historical record.
  verbatimDateOfAcquisition: The verbatim date of acquisition as found on the specimen label. Transcribe the text exactly as written, including any prefixes like 'don.', 'acq.', or symbols and Roman numerals. This field should only be populated if the date is explicitly linked to the acquisition, donation, or purchase of the specimen. If there are conflicting acquisition dates on the label, record both separated by a semicolon and a space.
  verbatimName: The verbatim original representation of the scientific name as it appears on the specimen label. This includes the full string of taxonomic information provided, potentially encompassing the Family, Genus, specific epithet, infraspecific epithet (subspecies/variety), author citation, and year of publication. Do not change the format or correct typos. Capture the name exactly as written on the label, including original spelling, non-standard abbreviations, or archaic nomenclature. Do not update the name to its current taxonomic equivalent or correct perceived spelling errors. Do not change the order of the taxonomic components or remove punctuation. If the label includes 'cf.', 'aff.', 'ID.', or 'var.', these must be preserved in the verbatim string.
mapping:
  GEOGRAPHY:
  - country
  - island
  - stateProvince
  - locality
  - fullLocalityText
  - verbatimCoordinates
  - verbatimAltitude
  - minAltitude
  - maxAltitude
  - altitudeUnit
  TAXONOMY:
  - fullScientificName
  - family
  - subfamily
  - tribe
  - genus
  - subgenus
  - species
  - subspecies
  - authorAndYear
  - verbatimName
  - identifier
  - identifierDate
  COLLECTING:
  - collector
  - collectingMethod
  - collectionDate
  - collectionDateEnd
  - verbatimCollectingDate
  - verbatimDateOfAcquisition
  - dateOfAcquisition
  - dateOfAcquisitionEnd
  - acquiredFrom
  - collectionName
  - biotope
  - sex
  - rowlabel
  - registrationNumber
  - additionalText
